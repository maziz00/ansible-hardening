---
# ─────────────────────────────────────────────────────
# Role: user-access
# CIS Controls: 5.x, 6.x — Password policy, sudo, account lockout
# Supports: RHEL, CentOS, Rocky, Ubuntu, Debian
# ─────────────────────────────────────────────────────

# ── PASSWORD POLICY ──────────────────────────────────

- name: "5.4.1 | Set password expiration (max days)"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS   {{ cis_password_max_days }}"
    backup: true
  when: "'5.4.1' not in cis_skip_rules"

- name: "5.4.1 | Set password min days between changes"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS   {{ cis_password_min_days }}"
  when: "'5.4.1' not in cis_skip_rules"

- name: "5.4.1 | Set minimum password length"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_LEN'
    line: "PASS_MIN_LEN    {{ cis_password_min_length }}"
  when: "'5.4.1' not in cis_skip_rules"

- name: "5.4.1 | Set password warning age"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: "PASS_WARN_AGE   {{ cis_password_warn_age }}"
  when: "'5.4.1' not in cis_skip_rules"

# ── PASSWORD QUALITY (RedHat: pwquality, Debian: pam_pwquality) ──

- name: "5.4.2 | Install password quality module (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  when:
    - ansible_os_family == 'Debian'
    - "'5.4.2' not in cis_skip_rules"

- name: "5.4.2 | Configure password quality"
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: "'5.4.2' not in cis_skip_rules"

# ── ACCOUNT LOCKOUT ──────────────────────────────────

- name: "5.4.3 | Configure account lockout (RedHat — faillock)"
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  when:
    - ansible_os_family == 'RedHat'
    - "'5.4.3' not in cis_skip_rules"

- name: "5.4.3 | Configure account lockout (Debian/Ubuntu — pam_faillock)"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth required pam_faillock.so deny={{ cis_account_lockout_attempts }} unlock_time={{ cis_account_lockout_time }}"
    insertbefore: '^auth.*pam_unix'
  when:
    - ansible_os_family == 'Debian'
    - "'5.4.3' not in cis_skip_rules"

# ── SUDO CONFIGURATION ──────────────────────────────

- name: "5.3.1 | Ensure sudo is installed"
  ansible.builtin.package:
    name: sudo
    state: present
  when: "'5.3.1' not in cis_skip_rules"

- name: "5.3.4 | Require reauthentication for sudo"
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^Defaults.*timestamp_timeout'
    line: 'Defaults    timestamp_timeout=15'
    validate: 'visudo -cf %s'
  when: "'5.3.4' not in cis_skip_rules"

- name: "5.3.5 | Restrict su command"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?auth.*required.*pam_wheel'
    line: 'auth required pam_wheel.so use_uid'
  when: "'5.3.5' not in cis_skip_rules"

# ── DEFAULT UMASK ────────────────────────────────────

- name: "5.4.4 | Set default umask"
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^\s*umask'
    line: "umask {{ cis_umask }}"
  loop:
    - /etc/bashrc
    - /etc/profile
  when:
    - "'5.4.4' not in cis_skip_rules"
    - ansible_os_family == 'RedHat'

- name: "5.4.4 | Set default umask (Debian/Ubuntu)"
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^\s*umask'
    line: "umask {{ cis_umask }}"
  loop:
    - /etc/bash.bashrc
    - /etc/profile
  when:
    - "'5.4.4' not in cis_skip_rules"
    - ansible_os_family == 'Debian'

# ── SHELL TIMEOUT ────────────────────────────────────

- name: "5.4.5 | Set shell timeout"
  ansible.builtin.lineinfile:
    path: /etc/profile.d/cis-timeout.sh
    line: "readonly TMOUT={{ cis_shell_timeout }} ; export TMOUT"
    create: true
    mode: "0644"
  when: "'5.4.5' not in cis_skip_rules"

# ── LOCK INACTIVE ACCOUNTS ──────────────────────────

- name: "5.4.1.4 | Lock accounts inactive > 30 days"
  ansible.builtin.command: useradd -D -f 30
  changed_when: false
  when: "'5.4.1.4' not in cis_skip_rules"
