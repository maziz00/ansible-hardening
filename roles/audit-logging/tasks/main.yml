---
# ─────────────────────────────────────────────────────
# Role: audit-logging
# CIS Controls: 4.1.x — auditd configuration
# Supports: RHEL, CentOS, Rocky, Ubuntu, Debian
# ─────────────────────────────────────────────────────

- name: "4.1.1 | Install auditd (RedHat)"
  ansible.builtin.dnf:
    name: "{{ cis_auditd_package_redhat }}"
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - "'4.1.1' not in cis_skip_rules"

- name: "4.1.1 | Install auditd (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "{{ cis_auditd_package_debian }}"
    state: present
  when:
    - ansible_os_family == 'Debian'
    - "'4.1.1' not in cis_skip_rules"

- name: "4.1.1 | Enable auditd service"
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  when: "'4.1.1' not in cis_skip_rules"

- name: "4.1.2 | Deploy auditd configuration"
  ansible.builtin.template:
    src: auditd.conf.j2
    dest: /etc/audit/auditd.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  notify: restart auditd
  when: "'4.1.2' not in cis_skip_rules"

- name: "4.1.3 | Deploy CIS audit rules"
  ansible.builtin.template:
    src: cis-audit.rules.j2
    dest: /etc/audit/rules.d/cis-hardening.rules
    owner: root
    group: root
    mode: "0640"
  notify: restart auditd
  when: "'4.1.3' not in cis_skip_rules"

- name: "4.2.1 | Configure rsyslog (RedHat)"
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
  when:
    - ansible_os_family == 'RedHat'
    - "'4.2.1' not in cis_skip_rules"
  failed_when: false

- name: "4.2.1 | Configure rsyslog (Debian/Ubuntu)"
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
  when:
    - ansible_os_family == 'Debian'
    - "'4.2.1' not in cis_skip_rules"
  failed_when: false

- name: "4.2.3 | Set log file permissions"
  ansible.builtin.command: find /var/log -type f -perm /037 -exec chmod 640 {} \;
  changed_when: false
  when: "'4.2.3' not in cis_skip_rules"
